# ============================================================
# Event Abstraction Ensemble configuration
# Dataset: BPIC 2015
#
# This config controls preprocessing up to abstraction.
# Discovery/evaluation settings can be added later.
# ============================================================

project:
  name: event-abstraction-ensemble
  root_dir: .

# ------------------------------------------------------------
# 1. Dataset setting
# ------------------------------------------------------------
dataset:
  name: bpic2015

  raw_log_path: data/bpic2015/raw/BPIC15_2_activityNameEN_as_concept_clean.xes

  columns:
    case_id: case:concept:name
    activity: concept:name
    timestamp: time:timestamp

  processed_dir: data/bpic2015/processed
  activity_map_file: act2ch.json
  case_strings_file: case_strings.jsonl.gz

# ------------------------------------------------------------
# 2. Model-based abstraction setting: LPM
# ------------------------------------------------------------
model_based:
  enabled: true

  raw_lpm_dir: data/bpic2015/raw/LPM_PN_Set

  ptml_dir: data/bpic2015/interim/LPM_PT_ver
  path_dir: data/bpic2015/interim/LPM_Path

  # User-defined LPM groups.
  # Same structure as the original Python list-of-lists
  lpm_groups: [[1, 46], [2, 53], [3, 42], [4, 35], [5, 64], [6, 11, 13, 55, 69], [7, 8, 83], [9], [10], [12, 45], [14, 58], [15], [16, 90], [17], [18], [19, 57], [20], [21], [22], [23, 83], [24], [25, 55], [26, 82], [27], [28, 44, 55, 61, 74, 76, 80], [29, 32], [30], [31, 49], [33, 55], [34, 44, 61], [36, 63], [37, 82, 99], [38], [39], [40, 56, 72], [41], [43], [47, 52], [48, 71], [50], [51, 53], [54, 93], [59, 62, 95], [60, 71], [65, 72, 82, 96], [66], [67, 92], [68], [70], [73], [75], [77], [78], [79], [81], [84], [85, 89, 95], [86], [87], [88, 95, 96, 99], [91, 93, 97], [94], [98], [100]]

  # Loop constraint for executable path enumeration.
  # This controls outputs such as:
  #   lpm_group_paths_loop2.json
  #   lpm_group_paths_loop2_remove_dup.json
  loop_constraint:
    enabled: true
    loop_max_iters: 1

  # Whether to remove duplicate paths after LPM path extraction.
  deduplicate_paths: true

  # Output filenames are generated from loop_max_iters and dedup setting.
  # Example:
  #   raw:   lpm_group_paths_loop2.json
  #   dedup: lpm_group_paths_loop2_remove_dup.json
  path_output:
    raw_template: lpm_group_paths_loop{loop_max_iters}.json
    dedup_template: lpm_group_paths_loop{loop_max_iters}_remove_dup.json

  # Safety limits for path enumeration.
  path_enumeration:
    max_trace_len: 200
    max_traces_per_lpm: 50000

# ------------------------------------------------------------
# 3. Instance-based abstraction setting: Session
# ------------------------------------------------------------
session_based:
  enabled: true

  session_split:
    gap_hours: 8

  clustering:
    algorithm: dbscan
    eps: 0.3
    min_samples: 5
    metric: euclidean

  output:
    dir: data/bpic2015/interim/cut_exports

    session_info_file: session_info.json.gz
    cluster_info_file: session_dbscan_clusters.json.gz
    cluster_patterns_file: session_dbscan_cluster_patterns.json.gz
    topk_pattern_template: session_dbscan_cut_topK_K{K:03d}.json

# ------------------------------------------------------------
# 4. Abstraction dictionary source
# ------------------------------------------------------------
abstraction_source:
  # Options:
  #   BOTH    : use both LPM paths and session paths
  #   LPM     : use only model-based LPM paths
  #   SESSION : use only session-based paths
  method: BOTH

  # Label prefixes used when building the unified pattern dictionary.
  label_prefix:
    lpm: G
    session: S

# ------------------------------------------------------------
# 5. Abstraction experiment sweep
# ------------------------------------------------------------
abstraction:
  # Number of cases used for abstraction.
  # Keep fixed in config; not included in result folder path by default.
  n_cases: 832
  seed: 42

  # K values to iterate.
  # For fixed K experiment, use: [60]
  # For K sweep, use for example: [3, 4, 5, 10, 15, 20, 30, 40, 50, 60]
  k_values: [60]

  # Jump allowance values to iterate.
  # For fixed jump experiment, use: [4]
  # For jump sweep, use: [1, 2, 3, 4, 5]
  jump_values: [5]

  # Segment matching direction.
  # If true:
  #   forward segment matching + backward segment matching are both used.
  # If false:
  #   only forward segment matching is used.
  use_backward_matching: true

  top_k_solutions: 5

# ------------------------------------------------------------
# 6. Results
# ------------------------------------------------------------
results:
  root_dir: results

  # These names are used to build result paths automatically.
  #
  # Final run path:
  # results/runs/
  #   {dataset.name}/
  #   {dictionary_variant}/
  #   method-{abstraction_source.method}/
  #   match-{bidir_or_fwd}/
  #   jump{jump:02d}/
  #   K{K:03d}/
  #
  run_dir_template: >-
    runs/{dataset_name}/{dictionary_variant}/method-{method}/match-{match_direction}/jump{jump:02d}/K{K:03d}

  summaries_dir: summaries
  figures_dir: figures

  # Each run folder will contain these subfolders.
  run_subdirs:
    - pattern_pool
    - matching
    - selection
    - discovery
    - evaluation
    - figures

# ------------------------------------------------------------
# 7. Generated dictionary variant name
# ------------------------------------------------------------
naming:
  dictionary_variant_template: dict_loop{loop_max_iters}

  match_direction:
    backward_true: bidir
    backward_false: fwd

# ============================================================
# 8. Full pipeline execution
# ============================================================
pipeline:
  stop_on_error: true

  # 전체 pipeline에서 공통으로 사용할 값
  shared:
    selected_rank: &selected_rank 1

  stages:
    "01":
      enabled: true
      name: prepare_lpm_paths
      script: scripts/01_prepare_lpm_paths.py
      args: {}

    "02":
      enabled: true
      name: build_session_patterns
      script: scripts/02_build_session_patterns.py
      args: {}

    "03":
      enabled: true
      name: run_segment_matching
      script: scripts/03_run_segment_matching.py
      args: {}

    "04":
      enabled: true
      name: select_topk_combinations
      script: scripts/04_select_topk_combinations.py
      args: {}

    "05":
      enabled: true
      name: discover_models
      script: scripts/05_discover_models.py
      args:
        rank: *selected_rank
        abstract-noise: 0.20
        local-noise: 0.0
        progress-every: 10

    "06":
      enabled: true
      name: evaluate_models
      script: scripts/06_evaluate_models.py
      args:
        rank: *selected_rank
        org-noise: 0.20

    "07":
      enabled: true
      name: compute_complexity
      script: scripts/07_compute_complexity.py
      args:
        rank: *selected_rank

        # 새 Colab 런타임이면 true.
        # 이미 설치한 같은 런타임에서 재실행할 때는 false.
        install-understandbpmn: true